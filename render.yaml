services:
  - type: web
    name: tetris-battle
    runtime: node
    plan: free
    buildCommand: npm install --build-from-source && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_PATH
        value: "/tmp/tetris.db"
